naftiko: 1.0.0-alpha2
info:
  label: EU Open Data Portal Search API — Distributions
  description: 'EU Open Data Portal Search API — Distributions. 1 operations. Lead operation: List dataset distributions.
    Self-contained Naftiko capability covering one Eu Open Data Portal business surface.'
  tags:
  - Eu Open Data Portal
  - Distributions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EU_OPEN_DATA_PORTAL_API_KEY: EU_OPEN_DATA_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-distributions
    baseUri: https://data.europa.eu/api/hub/search
    description: EU Open Data Portal Search API — Distributions business capability. Self-contained, no shared references.
    resources:
    - name: datasets-datasetId-distributions
      path: /datasets/{datasetId}/distributions
      operations:
      - name: getdatasetdistributions
        method: GET
        description: List dataset distributions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetId
          in: path
          type: string
          description: Unique dataset identifier
          required: true
  exposes:
  - type: rest
    namespace: search-distributions-rest
    port: 8080
    description: REST adapter for EU Open Data Portal Search API — Distributions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/datasets/{datasetid}/distributions
      name: datasets-datasetid-distributions
      description: REST surface for datasets-datasetId-distributions.
      operations:
      - method: GET
        name: getdatasetdistributions
        description: List dataset distributions
        call: search-distributions.getdatasetdistributions
        with:
          datasetId: rest.datasetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-distributions-mcp
    port: 9090
    transport: http
    description: MCP adapter for EU Open Data Portal Search API — Distributions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-dataset-distributions
      description: List dataset distributions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-distributions.getdatasetdistributions
      with:
        datasetId: tools.datasetId
      outputParameters:
      - type: object
        mapping: $.
